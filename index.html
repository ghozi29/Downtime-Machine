<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Mesin</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <h2 style="color:#fff;">⚙️ MAINTENANCE</h2>
      <nav>
        <a href="index.html" class="active">Dashboard Mesin</a>
        <a href="dataentry.html">Data Entry</a>
        <a href="dashboard-workload.html">Beban Kerja</a>
      </nav>
      <div class="sidebar-footer">
        <label style="color:#fff;">Pilih Area:</label>
        <select id="areaSelect">
          <option value="default">Default</option>
          <option value="Injeksi">Injeksi</option>
          <option value="Implant">Implant</option>
          <option value="Tablet Hormon">Tablet Hormon</option>
          <option value="Tablet Non Hormon">Tablet Non Hormon</option>
          <option value="QC">QC</option>
        </select>
      </div>
    </aside>

    <main class="main">
      <header>
        <h1>📊 Dashboard Mesin</h1>
      </header>

      <section class="kpi-row">
        <div class="kpi-card"><span>MTTR</span><span id="mttr">0</span></div>
        <div class="kpi-card"><span>MTBF</span><span id="mtbf">0</span></div>
        <div class="kpi-card"><span>Total Downtime</span><span id="totalDowntime">0</span></div>
        <div class="kpi-card"><span>Availability</span><span id="availability">0%</span></div>
        <div class="kpi-card"><span>Total Breakdown</span><span id="totalBreakdown">0</span></div>
      </section>

      <section class="chart-grid">
        <div class="card"><canvas id="pieChart"></canvas></div>
        <div class="card"><canvas id="barChart"></canvas></div>
        <div class="card"><canvas id="lineChart"></canvas></div>
        <div class="card"><canvas id="paretoChart"></canvas></div>
      </section>

      <section class="card">
        <table>
          <thead>
            <tr><th>Komponen</th><th>Jumlah Data</th><th>Rata-rata Umur</th><th>Total Jam Operasi</th></tr>
          </thead>
          <tbody id="mttfTableBody">
            <tr><td colspan="4">Memuat data...</td></tr>
          </tbody>
        </table>
      </section>
    </main>
  </div>

  <script type="module" src="dashboard.js"></script>
</body>
</html>
