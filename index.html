<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Entry Maintenance</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <div class="container">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-header"><h2>⚙️ MAINTENANCE</h2></div>
      <nav class="sidebar-nav">
        <a href="index.html"><i class="fas fa-tachometer-alt"></i> Dashboard Mesin</a>
        <a href="dataentry.html" class="active"><i class="fas fa-edit"></i> Data Entry</a>
        <a href="history.html"><i class="fas fa-history"></i> History</a>
        <a href="assistant.html"><i class="fas fa-robot"></i> AI Assistant</a>
      </nav>
    </div>

    <div class="main">
      <header class="header">
        <h1>📝 DATA ENTRY MAINTENANCE</h1>
        <p>Input data kerusakan mesin (MTTR/MTBF) dan penggantian komponen (MTTF)</p>
      </header>

      <div class="card">
        <div class="tabs">
          <button class="tab-btn active" id="tabMaintenanceBtn"><i class="fas fa-tools"></i> Kerusakan Mesin</button>
          <button class="tab-btn" id="tabComponentBtn"><i class="fas fa-microchip"></i> Komponen</button>
        </div>

        <!-- TAB MAINTENANCE -->
        <div id="tabMaintenance" class="tab-content active">
          <form id="maintenanceForm">
            <div class="form-row">
              <div class="form-group">
                <label>Nama Mesin *</label>
                <input type="text" id="machineName" required>
              </div>
              <div class="form-group">
                <label>Area *</label>
                <select id="machineCategory" required>
                  <option value="">-- Pilih Area --</option>
                  <option value="Injeksi">Injeksi</option>
                  <option value="Implant">Implant</option>
                  <option value="Tablet Hormon">Tablet Hormon</option>
                  <option value="Tablet Non Hormon">Tablet Non Hormon</option>
                  <option value="QC">QC</option>
                </select>
              </div>
            </div>

            <div class="form-section">
              <h4>⏱️ TIMELINE</h4>
              <div class="form-row">
                <div class="form-group">
                  <label>Mulai Operasi *</label>
                  <input type="datetime-local" id="operationStart" required>
                </div>
                <div class="form-group">
                  <label>Waktu Rusak *</label>
                  <input type="datetime-local" id="failureStart" required>
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>Mulai Perbaikan *</label>
                  <input type="datetime-local" id="maintenanceStart" required>
                </div>
                <div class="form-group">
                  <label>Selesai Perbaikan *</label>
                  <input type="datetime-local" id="maintenanceEnd" required>
                </div>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group full-width">
                <label>Personil Perbaikan *</label>
                <select id="technicians" multiple required style="height:120px;">
                  <option value="Maman Sukmana">Maman Sukmana</option>
                  <option value="Anto Istanto">Anto Istanto</option>
                  <option value="Bahtiar">Bahtiar</option>
                  <option value="Hatip">Hatip</option>
                  <option value="Slamet Riyanto">Slamet Riyanto</option>
                  <option value="Imron">Imron</option>
                </select>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group full-width">
                <label>Catatan Perbaikan</label>
                <textarea id="note" rows="3"></textarea>
              </div>
            </div>

            <div class="form-actions">
              <button type="reset">Reset</button>
              <button type="submit">Simpan Data Mesin</button>
            </div>
          </form>
        </div>

        <!-- TAB COMPONENT -->
        <div id="tabComponent" class="tab-content">
          <form id="componentForm">
            <div class="form-row">
              <div class="form-group">
                <label>Nama Komponen *</label>
                <input type="text" id="componentName" required>
              </div>
              <div class="form-group">
                <label>Tanggal Pemasangan *</label>
                <input type="date" id="installDate" required>
              </div>
              <div class="form-group">
                <label>Tanggal Penggantian *</label>
                <input type="date" id="replacementDate" required>
              </div>
              <div class="form-group">
                <label>Total Jam Operasi</label>
                <input type="number" id="operatingHours" readonly>
              </div>
            </div>
            <div class="form-actions">
              <button type="reset">Reset</button>
              <button type="submit">Simpan Komponen</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="dataentry.js"></script>
</body>
</html>
