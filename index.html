<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maintenance Dashboard</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <h2>⚙️ MAINTENANCE</h2>
      <select id="areaSelect">
        <option value="hormon">Area Hormon</option>
        <option value="injeksi">Area Injeksi</option>
        <option value="tablet-hormon">Area Tablet Hormon</option>
        <option value="tablet-non-hormon">Area Tablet Non Hormon</option>
      </select>
    </aside>

    <main class="main">
      <header><h1>📊 DASHBOARD MAINTENANCE</h1></header>

      <!-- KPI -->
      <div class="kpi-row">
        <div class="kpi-card">MTTR: <span id="mttr">0</span></div>
        <div class="kpi-card">MTBF: <span id="mtbf">0</span></div>
        <div class="kpi-card">MTTF: <span id="mttf">0</span></div>
        <div class="kpi-card">Availability: <span id="availability">0%</span></div>
        <div class="kpi-card">Total Downtime: <span id="totalDowntime">0</span></div>
        <div class="kpi-card">Total Breakdown: <span id="totalBreakdown">0</span></div>
      </div>

      <!-- Filter -->
      <div class="filter-row">
        <label>Periode: </label>
        <select id="periodFilter">
          <option value="today">Hari Ini</option>
          <option value="week">Minggu Ini</option>
          <option value="month" selected>Bulan Ini</option>
          <option value="3months">3 Bulan</option>
          <option value="6months">6 Bulan</option>
          <option value="year">Tahun Ini</option>
          <option value="all">Semua Data</option>
        </select>
        <button id="applyPeriodFilter">Update Dashboard</button>
      </div>

      <!-- Charts -->
      <canvas id="pieChart"></canvas>
      <canvas id="barChart"></canvas>
      <canvas id="lineChart"></canvas>
      <canvas id="paretoChart"></canvas>

      <!-- Tabel MTTF -->
      <h3>Komponen dengan MTTF</h3>
      <table>
        <thead>
          <tr>
            <th>Komponen</th>
            <th>Jumlah Data</th>
            <th>Rata-rata Umur</th>
            <th>Total Jam Operasi</th>
          </tr>
        </thead>
        <tbody id="mttfTableBody">
          <tr><td colspan="4">Memuat data...</td></tr>
        </tbody>
      </table>
    </main>
  </div>

  <!-- Loading & Notification -->
  <div id="loadingOverlay" class="loading-overlay" style="display:none;">Memuat data...</div>
  <div id="notification" class="notification"></div>

  <script type="module" src="dashboard.js"></script>
</body>
</html>
