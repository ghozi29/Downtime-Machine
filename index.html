<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Maintenance</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header"><h2>⚙️ MAINTENANCE</h2></div>
    <nav class="sidebar-nav">
      <a href="index.html" class="active">Dashboard</a>
      <a href="dataentry.html">Data Entry</a>
    </nav>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="header">
      <h1>📊 DASHBOARD</h1>
      <p id="periodDisplay"></p>
    </div>

    <!-- KPI -->
    <div class="kpi-row">
      <div class="kpi-card"><span>MTTR</span><h2 id="mttr">0</h2></div>
      <div class="kpi-card"><span>MTBF</span><h2 id="mtbf">0</h2></div>
      <div class="kpi-card"><span>MTTF</span><h2 id="mttf">0</h2></div>
      <div class="kpi-card"><span>Availability</span><h2 id="availability">0%</h2></div>
      <div class="kpi-card"><span>Downtime</span><h2 id="totalDowntime">0</h2></div>
      <div class="kpi-card"><span>Breakdown</span><h2 id="totalBreakdown">0</h2></div>
    </div>

    <!-- FILTER -->
    <div class="card">
      <select id="periodFilter">
        <option value="month">Bulan Ini</option>
        <option value="all">Semua</option>
      </select>
      <button id="applyPeriodFilter">Filter</button>
    </div>

    <!-- CHART -->
    <div class="chart-grid">
      <canvas id="pieChart"></canvas>
      <canvas id="barChart"></canvas>
      <canvas id="lineChart"></canvas>
      <canvas id="paretoChart"></canvas>
    </div>

    <!-- TABLE -->
    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Komponen</th>
            <th>Jumlah</th>
            <th>MTTF</th>
          </tr>
        </thead>
        <tbody id="mttfTableBody"></tbody>
      </table>
    </div>

  </div>
</div>

<div id="loadingOverlay" class="loading-overlay">Loading...</div>

<script type="module" src="app.js"></script>
</body>
</html>
