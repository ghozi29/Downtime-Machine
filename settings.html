<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengaturan</title>
<link rel="stylesheet" href="styles.css">
<style>
  body.light { background: #f5f5f5; color: #222; }
  body.dark { background: #222; color: #f5f5f5; }
  .container { max-width: 800px; margin: 2rem auto; padding: 1rem; }
  .card { background: #fff; padding: 1rem; margin-bottom: 1rem; border-radius: 8px; }
  .dark .card { background: #333; }
  label { display: block; margin-top: 0.5rem; }
  input, select { width: 100%; padding: 0.5rem; margin-top: 0.25rem; }
  button { margin-top: 0.5rem; padding: 0.5rem 1rem; }
  .notification { display: none; padding: 0.5rem; margin-top: 0.5rem; border-radius: 4px; }
  .notification.success { background: #4caf50; color: #fff; }
  .notification.error { background: #f44336; color: #fff; }
</style>
</head>
<body class="light">
<div class="container">
  <h1>Pengaturan</h1>

  <!-- MODE GELAP / TERANG -->
  <div class="card">
    <h3>Mode Tampilan</h3>
    <label>
      Pilih mode:
      <select id="themeSelect">
        <option value="light">Terang</option>
        <option value="dark">Gelap</option>
      </select>
    </label>
  </div>

  <!-- NOTIFIKASI EMAIL -->
  <div class="card">
    <h3>Notifikasi Email</h3>
    <label>
      Email penerima:
      <input type="email" id="notifEmail" placeholder="contoh: admin@example.com">
    </label>
    <button id="saveEmailBtn">Simpan Email</button>
    <button id="testEmailBtn">Kirim Test Email</button>
  </div>

  <!-- PREFERENSI DASHBOARD -->
  <div class="card">
    <h3>Preferensi Dashboard</h3>
    <label>
      Chart default:
      <select id="defaultChart">
        <option value="line">Line Chart</option>
        <option value="bar">Bar Chart</option>
        <option value="pie">Pie Chart</option>
      </select>
    </label>
    <label>
      Periode default:
      <select id="defaultPeriod">
        <option value="today">Hari ini</option>
        <option value="week">Minggu ini</option>
        <option value="month">Bulan ini</option>
        <option value="3months">3 Bulan</option>
        <option value="6months">6 Bulan</option>
        <option value="year">Tahun ini</option>
      </select>
    </label>
  </div>

  <!-- RESET PENGATURAN -->
  <div class="card">
    <h3>Reset Pengaturan</h3>
    <button id="resetSettingsBtn">Reset ke Default</button>
  </div>

  <div id="notification" class="notification"></div>
</div>

<script type="module" src="settings.js"></script>
</body>
</html>
